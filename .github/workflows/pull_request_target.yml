name: "Persist credentials"
on:
  pull_request_target:

permissions:
  contents: read 

jobs:
  install-dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ github.head_ref }}
      - run: python super-print.py "bonjour !"

