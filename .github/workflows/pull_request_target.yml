name: "Persist credentials"
on:
  pull_request_target:

permissions:
  contents: read 

jobs:
  install-dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{github.event.pull_request.head.ref}}
      - run: python super-print.py "bonjour !"

